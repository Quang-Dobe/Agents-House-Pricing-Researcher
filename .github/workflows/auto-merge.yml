name: Auto-merge ready PRs

# Automatically merges pull requests that are ready for review (i.e. NOT drafts)
# once they are mergeable and all their checks have passed.
#
# A PR is auto-merged when ALL of the following hold:
#   - it is open and NOT a draft
#   - it does not carry an opt-out label (see SKIP_LABELS below)
#   - GitHub reports it as mergeable (no conflicts)
#   - every reported status check / check run has completed successfully
#     (a PR with no checks at all is treated as passing)
#
# The job re-evaluates every open non-draft PR on each trigger, so it also
# reacts to CI finishing (check_suite / workflow_run "completed") — not just
# to PR events. It is idempotent and safe to run repeatedly.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["*"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge every ready, passing PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          # Merge method: squash | merge | rebase
          MERGE_METHOD: squash
          # PRs carrying any of these labels are never auto-merged.
          SKIP_LABELS: "no-auto-merge do-not-merge wip hold"
        run: |
          set -euo pipefail

          echo "Scanning open, non-draft PRs in $GH_REPO ..."

          # List every open PR that is not a draft.
          prs=$(gh pr list --state open --limit 100 \
            --json number,isDraft,labels \
            --jq '.[] | select(.isDraft == false) | @base64')

          if [ -z "$prs" ]; then
            echo "No open, ready-for-review PRs found. Nothing to do."
            exit 0
          fi

          # jq program: classify a PR's statusCheckRollup into pending / bad / ok.
          read -r -d '' JQ_ROLLUP <<'JQ' || true
            def classify:
              if .__typename == "CheckRun" then
                (if .status != "COMPLETED" then "pending"
                 elif (.conclusion | IN("SUCCESS","NEUTRAL","SKIPPED")) then "ok"
                 else "bad" end)
              elif .__typename == "StatusContext" then
                (if .state == "PENDING" then "pending"
                 elif .state == "SUCCESS" then "ok"
                 else "bad" end)
              else "ok" end;
            [ .statusCheckRollup[]? | classify ] as $c
            | if ($c | index("pending")) then "pending"
              elif ($c | index("bad")) then "bad"
              else "ok" end
JQ

          merged=0
          for row in $prs; do
            pr_json=$(echo "$row" | base64 --decode)
            number=$(echo "$pr_json" | jq -r '.number')
            labels=$(echo "$pr_json" | jq -r '.labels[].name' | tr '\n' ' ')

            # Honor opt-out labels.
            skip=0
            for l in $SKIP_LABELS; do
              case " $labels " in
                *" $l "*) skip=1 ;;
              esac
            done
            if [ "$skip" -eq 1 ]; then
              echo "PR #$number: carries an opt-out label ($labels) — skipping."
              continue
            fi

            # Fetch merge state + check rollup for this PR.
            detail=$(gh pr view "$number" \
              --json mergeable,mergeStateStatus,statusCheckRollup)
            mergeable=$(echo "$detail" | jq -r '.mergeable')

            if [ "$mergeable" = "CONFLICTING" ]; then
              echo "PR #$number: has merge conflicts — skipping."
              continue
            fi

            checks=$(echo "$detail" | jq -r "$JQ_ROLLUP")
            case "$checks" in
              pending)
                echo "PR #$number: checks still running — will retry on completion."
                continue ;;
              bad)
                echo "PR #$number: one or more checks failed — skipping."
                continue ;;
              ok)
                echo "PR #$number: ready and green — merging (--$MERGE_METHOD)."
                if gh pr merge "$number" "--$MERGE_METHOD" --delete-branch; then
                  merged=$((merged + 1))
                else
                  echo "PR #$number: merge attempt failed (may be racing another run)."
                fi ;;
            esac
          done

          echo "Done. Merged $merged PR(s) this run."
